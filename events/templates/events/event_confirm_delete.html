{% extends 'events/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 border-danger">
            <h2 class="text-danger">🗑️ Confirm Delete</h2>
            <p class="mt-3">Are you sure you want to delete the event:</p>
            <h5 class="text-dark">"{{ event.name }}"</h5>
            <p class="text-muted">📅 {{ event.date }} &nbsp; ⏰ {{ event.time }}</p>
            <p class="text-danger"><strong>⚠️ This action cannot be undone.</strong></p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'event_list' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
